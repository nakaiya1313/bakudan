<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ばくたんスイープ</title>
<style>
  :root{
    --bg:#11161d; --panel:#1b2530; --panelEdge:#0b1015;
    --cell:#46566a; --cellHi:#5e708a; --cellLo:#2e3b4a;
    --open:#26313d; --openEdge:#1a232c;
    --ink:#e2e8f0; --sub:#7e91a6; --danger:#ff4d5e; --flag:#ffce3a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    overscroll-behavior:none}
  body{min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:10px 8px calc(env(safe-area-inset-bottom) + 10px);gap:10px}
  .title{font-weight:800;letter-spacing:.18em;font-size:18px;color:var(--ink);
    text-shadow:0 2px 0 #000;margin:2px 0 0}
  .title b{color:var(--flag)}

  .panel{width:100%;max-width:480px;background:var(--panel);
    border:2px solid var(--panelEdge);border-radius:10px;
    box-shadow:inset 0 1px 0 #2c3b4c, 0 6px 0 #0a0e13;padding:10px}

  .hud{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .gauge{display:flex;align-items:center;gap:6px;background:#0c1117;
    border:2px solid #060a0e;border-radius:8px;padding:6px 9px;min-width:84px;
    font-family:"Courier New",monospace;font-weight:700;font-size:18px;
    letter-spacing:.08em}
  .gauge .lbl{display:flex}
  .gauge .num{color:#ff5d5d;text-shadow:0 0 6px rgba(255,80,80,.35)}
  .gauge.time .num{color:#5ad7ff;text-shadow:0 0 6px rgba(90,215,255,.35)}

  .face{width:48px;height:48px;flex:0 0 48px;border:none;cursor:pointer;
    border-radius:9px;background:linear-gradient(#56697f,#33455a);
    box-shadow:inset 0 2px 0 #74879e, inset 0 -3px 0 #223040, 0 3px 0 #0a0e13;
    display:flex;align-items:center;justify-content:center;
    touch-action:manipulation}
  .face:active{transform:translateY(2px);box-shadow:inset 0 2px 0 #74879e, inset 0 -1px 0 #223040,0 1px 0 #0a0e13}

  .levels{display:flex;gap:6px;margin-bottom:8px}
  .levels button{flex:1;border:2px solid #0b1015;background:#2a3a4a;color:var(--sub);
    font-weight:700;font-size:13px;padding:8px 4px;border-radius:7px;cursor:pointer;
    touch-action:manipulation;box-shadow:0 3px 0 #0a0e13}
  .levels button.on{background:#3a5068;color:#fff;box-shadow:0 3px 0 #16202a, inset 0 0 0 2px var(--flag)}
  .levels button:active{transform:translateY(2px);box-shadow:0 1px 0 #0a0e13}
  .levels small{display:block;font-weight:600;color:#9fb1c4;font-size:10px;margin-top:2px}

  .modebar{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .modebar .mode{display:flex;gap:0;border:2px solid #0b1015;border-radius:8px;overflow:hidden;flex:1}
  .modebar .mode button{flex:1;border:none;background:#22303d;color:var(--sub);
    font-weight:800;font-size:14px;padding:9px 4px;cursor:pointer;touch-action:manipulation;
    display:flex;align-items:center;justify-content:center;gap:6px}
  .modebar .mode button.on{background:#3a5068;color:#fff}
  .modebar .hint{color:var(--sub);font-size:11px;line-height:1.3;text-align:right;flex:0 0 auto}

  .boardwrap{display:flex;justify-content:center;width:100%}
  .board{display:grid;gap:2px;background:#0b1015;padding:4px;border-radius:6px;
    border:2px solid #060a0e;touch-action:manipulation;user-select:none;
    box-shadow:inset 0 0 0 1px #1a232c}
  .cell{width:var(--cs);height:var(--cs);border:none;padding:0;margin:0;
    background:var(--cell);border-radius:3px;position:relative;cursor:pointer;
    box-shadow:inset 0 3px 0 var(--cellHi), inset 0 -3px 0 var(--cellLo);
    display:flex;align-items:center;justify-content:center;touch-action:manipulation}
  .cell:focus-visible{outline:3px solid var(--flag);outline-offset:1px;z-index:2}
  .cell.open{background:var(--open);
    box-shadow:inset 0 0 0 1px var(--openEdge), inset 0 2px 3px rgba(0,0,0,.45)}
  .cell.boom{background:#5a1d22;box-shadow:inset 0 0 0 1px #2a0d10}
  .cell.wrong{background:#3a2a3a}
  .cell svg{display:block;width:74%;height:74%}
  .cell.num svg{width:46%;height:78%}

  .result{height:20px;margin-top:8px;text-align:center;font-weight:800;
    letter-spacing:.12em;font-size:15px;min-height:20px}
  .result.win{color:#6fff9b}
  .result.lose{color:var(--danger)}
  .best{color:var(--sub);font-size:11px;text-align:center;margin-top:2px}

  #ad{margin-top:4px;min-height:100px;display:flex;align-items:center;justify-content:center}

  @keyframes pop{from{transform:scale(.6)}to{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-3px,1px)}
    40%{transform:translate(3px,-1px)}60%{transform:translate(-2px,-1px)}80%{transform:translate(2px,1px)}}
  @media (prefers-reduced-motion: no-preference){
    .cell.open svg{animation:pop .12s ease-out}
    .board.boom{animation:shake .3s}
  }
</style>
</head>
<body>
  <div class="title">ばく<b>たん</b>スイープ</div>

  <div class="panel">
    <div class="hud">
      <div class="gauge"><span class="lbl" id="mineIcon"></span><span class="num" id="mineCount">000</span></div>
      <button class="face" id="face" aria-label="リセット"></button>
      <div class="gauge time"><span class="num" id="timeCount">000</span></div>
    </div>

    <div class="levels" id="levels"></div>

    <div class="modebar">
      <div class="mode" id="mode">
        <button data-mode="dig" class="on" id="mDig"></button>
        <button data-mode="flag" id="mFlag"></button>
      </div>
      <div class="hint">長おしでも<br>はたを立てる</div>
    </div>
  </div>

  <div class="boardwrap"><div class="board" id="board"></div></div>

  <div class="result" id="result"></div>
  <div class="best" id="best"></div>

  <div id="ad"></div>

<script>
"use strict";

/* ===== レベル定義 ===== */
var LEVELS = {
  easy: {w:9,  h:9,  m:10, label:"しょきゅう"},
  mid:  {w:12, h:12, m:22, label:"ちゅうきゅう"},
  hard: {w:12, h:18, m:44, label:"じょうきゅう"}
};
var BEST_KEY = "bakutan_best_v1";

/* ===== ドット絵（自作・著作権フリー） =====
   3x5の数字、7x7の地雷・旗・顔。Windows版の素材は一切使わない。 */
var DIGITS = {
  1:["010","110","010","010","111"],
  2:["111","001","111","100","111"],
  3:["111","001","111","001","111"],
  4:["101","101","111","001","001"],
  5:["111","100","111","001","111"],
  6:["111","100","111","101","111"],
  7:["111","001","010","010","010"],
  8:["111","101","111","101","111"]
};
var NUM_COLOR = {1:"#5ad7ff",2:"#6fff9b",3:"#ff7a8a",4:"#c69bff",5:"#ffcf5a",6:"#5af0d0",7:"#ff9f5a",8:"#e2e8f0"};

var MINE = ["0011000","0010100","0111110","1111111","1111111","0111110","0011100"];
var FLAG = ["0000000","0011100","0011110","0011100","0010000","0010000","0111000"];

var FACE = {
  ok:  ["0000000","0110110","0110110","0000000","0111110","0000000","0000000"],
  win: ["0000000","0110110","0110110","0000000","1000001","0111110","0000000"],
  bad: ["0000000","1010101","0100010","1010101","0000000","0111110","0000000"]
};

function dotSVG(bitmap, color){
  var rows=bitmap.length, cols=bitmap[0].length, r="";
  for(var y=0;y<rows;y++){
    for(var x=0;x<cols;x++){
      if(bitmap[y].charAt(x)==="1") r+='<rect x="'+x+'" y="'+y+'" width="1" height="1" fill="'+color+'"/>';
    }
  }
  return '<svg viewBox="0 0 '+cols+' '+rows+'" shape-rendering="crispEdges">'+r+'</svg>';
}

/* 顔・アイコンの初期描画 */
document.getElementById("mineIcon").innerHTML =
  '<svg viewBox="0 0 7 7" width="16" height="16" shape-rendering="crispEdges">'+
  MINE.map(function(row,y){var s="";for(var x=0;x<7;x++){if(row.charAt(x)==="1")s+='<rect x="'+x+'" y="'+y+'" width="1" height="1" fill="#ff5d5d"/>';}return s;}).join("")+'</svg>';
document.getElementById("mDig").innerHTML  = dotSVGsmall(FLAG_TO_PICK(),"#fff")  + '<span>ひらく</span>';
document.getElementById("mFlag").innerHTML = dotSVGsmall(FLAG,"#ffce3a") + '<span>はた</span>';
function FLAG_TO_PICK(){return MINE;} // ひらく＝地雷モチーフのドット
function dotSVGsmall(bm,color){return '<span style="display:inline-flex;width:15px;height:15px">'+dotSVG(bm,color)+'</span>';}

/* ===== 状態 ===== */
var W,H,M, mineArr, adjArr, openArr, flagArr, started, ended, flagsUsed, openedCount, mode="dig", levelKey="easy";
var timer=null, secs=0;

var boardEl  = document.getElementById("board");
var faceEl   = document.getElementById("face");
var resultEl = document.getElementById("result");
var bestEl   = document.getElementById("best");
var mineCountEl = document.getElementById("mineCount");
var timeCountEl = document.getElementById("timeCount");

/* レベルボタン生成 */
(function(){
  var c=document.getElementById("levels");
  Object.keys(LEVELS).forEach(function(k){
    var L=LEVELS[k];
    var b=document.createElement("button");
    b.dataset.k=k;
    b.innerHTML=L.label+'<small>'+L.w+'×'+L.h+' / 💣'+L.m+'</small>';
    b.addEventListener("click",function(){ levelKey=k; newGame(); });
    c.appendChild(b);
  });
})();

function pad3(n){ n=Math.max(0,Math.min(999,n|0)); return ("00"+n).slice(-3); }
function idx(x,y){ return y*W+x; }
function inBounds(x,y){ return x>=0&&x<W&&y>=0&&y<H; }
function neighbors(i){
  var x=i%W, y=(i/W)|0, out=[];
  for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
    if(dx===0&&dy===0)continue;
    if(inBounds(x+dx,y+dy)) out.push((y+dy)*W+(x+dx));
  }
  return out;
}

/* ===== 盤面生成 ===== */
function newGame(){
  var L=LEVELS[levelKey]; W=L.w; H=L.h; M=L.m;
  mineArr=new Array(W*H).fill(false);
  adjArr =new Array(W*H).fill(0);
  openArr=new Array(W*H).fill(false);
  flagArr=new Array(W*H).fill(false);
  started=false; ended=false; flagsUsed=0; openedCount=0; secs=0;
  stopTimer(); setFace("ok"); resultEl.textContent=""; resultEl.className="result";
  document.querySelectorAll("#levels button").forEach(function(b){ b.classList.toggle("on", b.dataset.k===levelKey); });
  layoutBoard();
  updateHud();
  showBest();
}

function layoutBoard(){
  // 携帯幅にセルを合わせる
  var maxW = Math.min(window.innerWidth-24, 480);
  var cs = Math.floor((maxW-8-(W-1)*2)/W);
  cs = Math.max(24, Math.min(40, cs));
  boardEl.style.setProperty("--cs", cs+"px");
  boardEl.style.gridTemplateColumns = "repeat("+W+","+cs+"px)";
  boardEl.className="board";
  boardEl.innerHTML="";
  for(var i=0;i<W*H;i++){
    var b=document.createElement("button");
    b.className="cell"; b.dataset.i=i; b.setAttribute("aria-label","マス");
    boardEl.appendChild(b);
  }
}

function placeMines(safe){
  var safeSet={}; safeSet[safe]=1; neighbors(safe).forEach(function(n){safeSet[n]=1;});
  var pool=[];
  for(var i=0;i<W*H;i++){ if(!safeSet[i]) pool.push(i); }
  // フィッシャー–イェーツで地雷を選ぶ
  for(var n=0;n<M && pool.length;n++){
    var j=(Math.random()*pool.length)|0;
    var cell=pool[j]; pool[j]=pool[pool.length-1]; pool.pop();
    mineArr[cell]=true;
  }
  for(var k=0;k<W*H;k++){
    if(mineArr[k]) continue;
    var c=0; neighbors(k).forEach(function(nb){ if(mineArr[nb]) c++; });
    adjArr[k]=c;
  }
}

/* ===== 描画 ===== */
function cellEl(i){ return boardEl.children[i]; }
function paint(i){
  var el=cellEl(i);
  el.className="cell";
  el.innerHTML="";
  if(flagArr[i] && !openArr[i]){ el.innerHTML=dotSVG(FLAG,"#ffce3a"); return; }
  if(!openArr[i]) return;
  el.classList.add("open");
  if(mineArr[i]){ el.classList.add("boom","num"); el.innerHTML=dotSVG(MINE,"#0b0f14"); return; }
  if(adjArr[i]>0){ el.classList.add("num"); el.innerHTML=dotSVG(DIGITS[adjArr[i]],NUM_COLOR[adjArr[i]]); }
}

function setFace(s){ faceEl.innerHTML='<span style="width:26px;height:26px;display:inline-flex">'+dotSVG(FACE[s], s==="bad"?"#ff5d5d":(s==="win"?"#6fff9b":"#e2e8f0"))+'</span>'; }
function updateHud(){
  mineCountEl.textContent=pad3(M-flagsUsed);
  timeCountEl.textContent=pad3(secs);
}

/* ===== タイマー ===== */
function startTimer(){ if(timer)return; timer=setInterval(function(){ secs=Math.min(999,secs+1); timeCountEl.textContent=pad3(secs); if(secs>=999) stopTimer(); },1000); }
function stopTimer(){ if(timer){ clearInterval(timer); timer=null; } }

/* ===== 開く・旗・コード ===== */
function reveal(i){
  if(ended||openArr[i]||flagArr[i]) return;
  if(!started){ started=true; placeMines(i); startTimer(); ensureAd(); }
  if(mineArr[i]){ openArr[i]=true; boom(i); return; }
  // ゼロ連鎖を反復で展開
  var stack=[i];
  while(stack.length){
    var c=stack.pop();
    if(openArr[c]||flagArr[c]) continue;
    openArr[c]=true; openedCount++; paint(c);
    if(adjArr[c]===0){ neighbors(c).forEach(function(nb){ if(!openArr[nb]&&!flagArr[nb]&&!mineArr[nb]) stack.push(nb); }); }
  }
  sfxReveal();
  checkWin();
}

function toggleFlag(i){
  if(ended||openArr[i]) return;
  flagArr[i]=!flagArr[i];
  flagsUsed+=flagArr[i]?1:-1;
  paint(i); updateHud(); sfxFlag();
}

function chord(i){
  if(ended||!openArr[i]||adjArr[i]===0) return;
  var nb=neighbors(i), f=0;
  nb.forEach(function(n){ if(flagArr[n]) f++; });
  if(f!==adjArr[i]) return;
  nb.forEach(function(n){ if(!flagArr[n]&&!openArr[n]) reveal(n); });
}

function boom(hit){
  ended=true; stopTimer(); setFace("bad");
  for(var i=0;i<W*H;i++){
    if(mineArr[i]&&!flagArr[i]) openArr[i]=true;
    if(!mineArr[i]&&flagArr[i]){ paint(i); cellEl(i).classList.add("wrong"); }
    if(mineArr[i]) paint(i);
  }
  cellEl(hit).classList.add("boom");
  boardEl.classList.add("boom");
  resultEl.textContent="ゲームオーバー"; resultEl.className="result lose";
  sfxBoom();
}

function checkWin(){
  if(openedCount === W*H - M){
    ended=true; stopTimer(); setFace("win");
    for(var i=0;i<W*H;i++){ if(mineArr[i]&&!flagArr[i]){ flagArr[i]=true; paint(i); } }
    flagsUsed=M; updateHud();
    resultEl.textContent="クリア！ "+secs+"びょう"; resultEl.className="result win";
    saveBest(secs); showBest();
    sfxWin();
  }
}

/* ===== ベストタイム ===== */
function loadBest(){ try{ return JSON.parse(localStorage.getItem(BEST_KEY))||{}; }catch(e){ return {}; } }
function saveBest(s){ var b=loadBest(); if(b[levelKey]==null||s<b[levelKey]){ b[levelKey]=s; try{localStorage.setItem(BEST_KEY,JSON.stringify(b));}catch(e){} } }
function showBest(){ var b=loadBest()[levelKey]; bestEl.textContent = b!=null ? ("ベスト："+b+"びょう（"+LEVELS[levelKey].label+"）") : ""; }

/* ===== 入力（pointer・長押し・チョード） ===== */
var pressIdx=-1, pressTime=0, longFired=false, longTimer=null, startX=0, startY=0;
function cellFromEvent(e){
  var t=e.target; while(t&&t!==boardEl&&!t.classList.contains("cell")) t=t.parentNode;
  return (t&&t.classList&&t.classList.contains("cell"))? parseInt(t.dataset.i,10) : -1;
}
boardEl.addEventListener("pointerdown",function(e){
  if(ended) return;
  var i=cellFromEvent(e); if(i<0) return;
  pressIdx=i; longFired=false; startX=e.clientX; startY=e.clientY; pressTime=Date.now();
  ensureCtx();
  longTimer=setTimeout(function(){
    longFired=true;
    if(!openArr[i]){ toggleFlag(i); if(navigator.vibrate) navigator.vibrate(15); }
  },280);
});
boardEl.addEventListener("pointermove",function(e){
  if(pressIdx<0) return;
  if(Math.abs(e.clientX-startX)>10||Math.abs(e.clientY-startY)>10){ clearTimeout(longTimer); pressIdx=-1; }
});
boardEl.addEventListener("pointerup",function(e){
  if(pressIdx<0) return;
  clearTimeout(longTimer);
  var i=pressIdx; pressIdx=-1;
  if(longFired) return;
  if(openArr[i]){ chord(i); }
  else if(mode==="flag"){ toggleFlag(i); }
  else { reveal(i); }
});
boardEl.addEventListener("pointercancel",function(){ clearTimeout(longTimer); pressIdx=-1; });
boardEl.addEventListener("contextmenu",function(e){
  e.preventDefault();
  var i=cellFromEvent(e); if(i>=0&&!ended) toggleFlag(i);
});

/* モード切替 */
document.getElementById("mode").addEventListener("click",function(e){
  var b=e.target.closest("button[data-mode]"); if(!b) return;
  mode=b.dataset.mode;
  document.querySelectorAll("#mode button").forEach(function(x){ x.classList.toggle("on", x===b); });
});
faceEl.addEventListener("click",newGame);
window.addEventListener("resize",function(){ if(boardEl.children.length) layoutBoard(); for(var i=0;i<W*H;i++) paint(i); });

/* ===== 音（遅延ensureCtx・チップチューン） ===== */
var actx=null;
function ensureCtx(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); }
function blip(freq,dur,type,vol,when){
  if(!actx) return;
  var t=actx.currentTime+(when||0);
  var o=actx.createOscillator(), g=actx.createGain();
  o.type=type||"square"; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur+0.02);
}
function noise(dur,vol){
  if(!actx) return;
  var n=Math.floor(actx.sampleRate*dur), buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0);
  for(var i=0;i<n;i++){ d[i]=(Math.random()*2-1)*(1-i/n); }
  var s=actx.createBufferSource(); s.buffer=buf;
  var g=actx.createGain(); g.gain.value=vol||0.25;
  var f=actx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=900;
  s.connect(f); f.connect(g); g.connect(actx.destination); s.start();
}
function sfxReveal(){ blip(620,0.06,"square",0.12); }
function sfxFlag(){ blip(880,0.04,"triangle",0.16); blip(1180,0.05,"triangle",0.12,0.04); }
function sfxBoom(){ noise(0.5,0.35); blip(90,0.45,"sawtooth",0.22); }
function sfxWin(){ [523,659,784,1046].forEach(function(f,k){ blip(f,0.18,"square",0.16,k*0.09); }); }

/* ===== 忍者AdMax（iframe隔離・遅延読み込み） =====
   ↓のADID を自分の忍者AdMaxの広告IDに置き換えてください。 */
var ADID = "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX";
function ensureAd(){
  var c=document.getElementById("ad");
  if(!c||c.dataset.adDone) return;
  c.dataset.adDone="1";
  var ifr=document.createElement("iframe");
  ifr.scrolling="no"; ifr.frameBorder="0";
  ifr.style.cssText="border:0;width:300px;height:100px;display:block;margin:0 auto;overflow:hidden";
  c.appendChild(ifr);
  var d=ifr.contentDocument||ifr.contentWindow.document;
  d.open();
  d.write('<!doctype html><html><head><meta charset="utf-8"><style>body{margin:0}</style></head><body><script src="https://adm.shinobi.jp/s/'+ADID+'"><\/script></body></html>');
  d.close();
}

/* 起動 */
newGame();
</script>
</body>
</html>
